spring.application.name=ms-resena-service

server.port=8089

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/resenas_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming (para evitar errores de nombres)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.enable-hateoas=false

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# REMOTE SERVICES
clientes.service.url=http://localhost:8082/api/v1/clientes
hoteles.service.url=http://localhost:8083/api/v1/hoteles
habitaciones.service.url=http://localhost:8084/api/v1/habitaciones
reservas.service.url=http://localhost:8086/api/v1/reservas
