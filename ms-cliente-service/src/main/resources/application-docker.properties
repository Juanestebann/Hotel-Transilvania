spring.application.name=ms-cliente-service

server.port=8082

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/clientes_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.enable-hateoas=false

# EUREKA EN DOCKER
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
