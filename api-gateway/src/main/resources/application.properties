spring.application.name=api-gateway
server.port=8080

# AUTH
spring.cloud.gateway.server.webflux.routes[0].id=auth
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/**,/api/v1/usuarios/**

# CLIENTE
spring.cloud.gateway.server.webflux.routes[1].id=cliente
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/clientes/**

