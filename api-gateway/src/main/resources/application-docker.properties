spring.cloud.gateway.server.webflux.routes[9].uri=lb://MS-SERVICIO-ADICIONAL-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/api/v1/servicios-adicionales/**

# EUREKA EN DOCKER
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true