spring.application.name=ms-notificacion-service

server.port=8088

spring.datasource.url=jdbc:mysql://host.docker.internal:3306/notificaciones_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

spring.jpa.properties.hibernate.format_sql=true
springdoc.enable-hateoas=false

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# EUREKA EN DOCKER
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# REMOTE SERVICES
usuarios.service.url=http://ms-auth-usuarios-service:8081/api/v1/usuarios
clientes.service.url=http://ms-cliente-service:8082/api/v1/clientes
reservas.service.url=http://ms-reserva-service:8086/api/v1/reservas
