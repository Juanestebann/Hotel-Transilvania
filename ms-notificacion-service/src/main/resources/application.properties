spring.application.name=ms-notificacion-service

server.port=8088

spring.datasource.url=jdbc:mysql://localhost:3306/notificaciones_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

spring.jpa.properties.hibernate.format_sql=true
springdoc.enable-hateoas=false

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/