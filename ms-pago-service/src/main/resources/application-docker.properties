spring.application.name=ms-pago-service

server.port=8087

# MYSQL XAMPP DEL HOST
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/pagos_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# EUREKA EN DOCKER
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# RECOMENDADO PARA DOCKER
eureka.instance.prefer-ip-address=true

# SWAGGER
springdoc.enable-hateoas=false