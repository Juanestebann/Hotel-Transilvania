spring.application.name=ms-pago-service

server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/pagos_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456

# EUREKA
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

springdoc.enable-hateoas=false

# REMOTE SERVICES
usuarios.service.url=http://localhost:8081/api/v1/usuarios
reservas.service.url=http://localhost:8086/api/v1/reservas
