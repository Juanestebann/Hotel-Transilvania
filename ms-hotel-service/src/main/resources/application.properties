spring.application.name=ms-hotel-service

server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/hoteles_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# IMPORTANTE:
# none = Hibernate NO crea tablas.
# Las tablas las debe crear Flyway.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Naming strategy
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# LOGGING
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.org.flywaydb=DEBUG

# JWT
jwt.secret=mi_clave_super_secreta_para_jwt_123456